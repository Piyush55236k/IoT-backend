<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> IoT Dashboard - Machine 1 </title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>
    <div class="dashboard-container">
        <header>
            <h1>Machine 1 <span>Telemetry</span></h1>
            <div class="header-right">
                <button id="calibrate-btn" class="calibrate-btn" title="Recalibrate sensor baseline">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                    Calibrate
                </button>
                <div class="status-indicator">
                    <div id="conn-dot" class="dot disconnected"></div>
                    <span id="conn-status">Waiting for link...</span>
                </div>
            </div>
        </header>

        <!-- Status Row -->
        <div class="status-row">
            <!-- Machine Attachment Status -->
            <div class="status-card" id="attach-card">
                <div class="status-icon-wrap" id="attach-icon-wrap">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <div class="status-text-block">
                    <div class="status-label">Attachment</div>
                    <div class="status-value" id="attach-status">Checking...</div>
                </div>
            </div>

            <!-- Machine Health Status -->
            <div class="status-card" id="health-card">
                <div class="status-icon-wrap" id="health-icon-wrap">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </div>
                <div class="status-text-block">
                    <div class="status-label">Machine Health</div>
                    <div class="status-value" id="health-status">Awaiting Data...</div>
                </div>
            </div>

            <!-- Alert Banner -->
            <div class="status-card alert-card" id="alert-card">
                <div class="status-icon-wrap" id="alert-icon-wrap">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div class="status-text-block">
                    <div class="status-label">Alert</div>
                    <div class="status-value" id="alert-status">No Alert</div>
                </div>
            </div>
        </div>

        <!-- Sensor Grid -->
        <main class="grid-layout">
            <div class="glass-card">
                <div class="card-title">Temperature</div>
                <div class="card-value"><span id="val-temp">--</span><span class="unit">°C</span></div>
                <div class="progress-bar"><div class="fill" id="bar-temp" style="width: 0%;"></div></div>
            </div>
            <div class="glass-card">
                <div class="card-title">Voltage</div>
                <div class="card-value"><span id="val-volt">--</span><span class="unit">V</span></div>
                <div class="progress-bar"><div class="fill" id="bar-volt" style="width: 0%;"></div></div>
            </div>
            <div class="glass-card">
                <div class="card-title">Vibration</div>
                <div class="card-value" style="font-size:1.4rem;"><span id="val-vibration">--</span></div>
                <div class="progress-bar"><div class="fill" id="bar-vibration" style="width: 0%;"></div></div>
            </div>
            <div class="glass-card">
                <div class="card-title">Current</div>
                <div class="card-value"><span id="val-current">--</span><span class="unit">A</span></div>
                <div class="progress-bar"><div class="fill" id="bar-current" style="width: 0%;"></div></div>
            </div>
        </main>

        <!-- Calibration Toast -->
        <div id="calib-toast" class="calib-toast">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Calibration signal sent to device
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
